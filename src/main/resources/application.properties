# =============================================
# Projeto Integrador - Application Configuration
# =============================================
spring.application.name=projeto-integrador
# Server port
server.port=8080
# ---- PostgreSQL Database ----
spring.datasource.url=jdbc:postgresql://localhost:5432/projeto_integrador
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234
# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# ---- Sample data loaded from data.sql ----
# Ensures JPA creates the schema before data.sql seed runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
