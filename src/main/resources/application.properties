# =============================================
# Projeto Integrador - Application Configuration
# =============================================
spring.application.name=projeto-integrador
# Server port
server.port=8080
# ---- PostgreSQL Database ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/projeto_integrador}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# ---- Sample data loaded from data.sql ----
# Ensures JPA creates the schema before data.sql seed runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# ---- Multipart Upload Limits ----
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
server.tomcat.max-http-form-post-size=2MB
