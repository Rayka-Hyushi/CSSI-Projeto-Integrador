# =============================================
# Projeto Integrador – Application Configuration
# =============================================

spring.application.name=projeto-integrador

# Server port
server.port=8080

# ---- H2 In-Memory Database ----
spring.datasource.url=jdbc:h2:mem:projetodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- H2 Console (accessible at /h2-console) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ---- Sample data loaded from data.sql ----
# Ensures JPA creates the schema before data.sql seed runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
