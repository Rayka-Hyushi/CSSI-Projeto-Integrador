<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('Login')}">
    <title>Login</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Acesso ao Sistema</h2>
            </div>

            <div th:if="${param.erro != null and param.erro[0] == 'nao-aprovado'}"
                 class="alert alert-warning text-center">
                O cadastro desse usuário ainda não foi aprovado.
            </div>
            <div th:if="${param.erro != null and param.erro[0] == 'login'}" class="alert alert-danger text-center">
                Usuário ou senha inválidos.
            </div>
            <div th:if="${param.error}" class="alert alert-danger text-center">
                Usuário ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Você saiu do sistema com sucesso.
            </div>

            <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="email" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid gap-2 mb-4">
                    <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </div>

                <div class="text-center">
                    <p class="mb-2">Não tem uma conta? <a th:href="@{/cadastro}"
                                                          class="text-primary fw-bold text-decoration-none">Solicite seu
                        cadastro</a></p>
                    <a th:href="@{/recuperar-senha}" class="text-muted small text-decoration-none">Esqueci minha senha</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/navbar :: footer}"></footer>
<div th:replace="~{fragments/navbar :: scripts}"></div>
</body>
</html>
