<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SOS Project</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .btn-primary { border-radius: 10px; padding: 10px 30px; font-weight: bold; }
        .form-label { font-weight: 600; color: #495057; }
        .section-title { border-bottom: 2px solid #0d6efd; display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }
        .hidden-fields { display: none; }
    </style>
</head>
<body class="d-flex align-items-center py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold">Crie sua conta para aproveitar todos os recursos!</h2>
                        <p class="text-muted">Preencha os dados e envie a solicitação. Sua conta poderá ser usada assim que nossa equipe comprovar a autenticidade dos dados fornecidos e aprovar sua solicitação.</p>
                    </div>

                    <form th:action="@{/cadastro}" method="post">
                        <div class="row g-4 mb-4">
                            <!-- Basic Info -->
                            <div class="col-md-6">
                                <label for="nomeCompleto" class="form-label">Nome Completo: (*)</label>
                                <input type="text" class="form-control form-control-lg" id="nomeCompleto" name="nomeCompleto" placeholder="Carlos da Silva" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">E-mail: (*)</label>
                                <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="usuario@email.com" required>
                            </div>
                            <div class="col-md-6">
                                <label for="whatsapp" class="form-label">WhatsApp: (*)</label>
                                <input type="text" class="form-control form-control-lg" id="whatsapp" name="whatsapp" placeholder="00 00 91234-5678" required>
                            </div>
                            <div class="col-md-6">
                                <label for="cpf" class="form-label">CPF: (*)</label>
                                <input type="text" class="form-control form-control-lg" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-4">
                                <label class="form-label d-block">Tipo de Usuário: (*)</label>
                                <div class="form-check form-check-inline mt-2">
                                    <input class="form-check-input" type="radio" name="tipoUsuario" id="tipoCliente" value="ROLE_CLIENTE" checked onchange="togglePrestadorFields()">
                                    <label class="form-check-label" for="tipoCliente">Cliente</label>
                                </div>
                                <div class="form-check form-check-inline mt-2">
                                    <input class="form-check-input" type="radio" name="tipoUsuario" id="tipoPrestador" value="ROLE_PRESTADOR" onchange="togglePrestadorFields()">
                                    <label class="form-check-label" for="tipoPrestador">Prestador</label>
                                </div>
                            </div>

                            <div class="col-md-8">
                                <label for="senha" class="form-label">Crie uma senha: (*)</label>
                                <input type="password" class="form-control form-control-lg" id="senha" name="senha" required>
                            </div>
                        </div>

                        <!-- Prestador Specific Fields -->
                        <div id="prestadorFields" class="hidden-fields">
                            <h5 class="section-title">Dados do Veículo</h5>
                            <div class="row g-4 mb-4">
                                <div class="col-md-3">
                                    <label for="placaVeiculo" class="form-label">Placa do Veículo: (*)</label>
                                    <input type="text" class="form-control" id="placaVeiculo" name="placaVeiculo" placeholder="BRA0X23">
                                </div>
                                <div class="col-md-3">
                                    <label for="tipoVeiculo" class="form-label">Tipo de Veículo: (*)</label>
                                    <select class="form-select" id="tipoVeiculo" name="tipoVeiculo">
                                        <option th:each="tipo : ${T(com.projetointegrador.model.TipoVeiculo).values()}"
                                                th:value="${tipo}" th:text="${tipo}"></option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="capacidadeModel" class="form-label">Capacidade de Carga: (*)</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="capacidadeModel" name="capacidadeModel" placeholder="3000">
                                        <span class="input-group-text">KG</span>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label d-block">Aberto ou fechado: (*)</label>
                                    <div class="form-check form-check-inline mt-2">
                                        <input class="form-check-input" type="radio" name="abertoFechado" id="statusAberto" value="ABERTO" checked>
                                        <label class="form-check-label" for="statusAberto">Aberto</label>
                                    </div>
                                    <div class="form-check form-check-inline mt-2">
                                        <input class="form-check-input" type="radio" name="abertoFechado" id="statusFechado" value="FECHADO">
                                        <label class="form-check-label" for="statusFechado">Fechado</label>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <h5 class="section-title">Serviços Oferecidos:</h5>
                                    <div class="row row-cols-1 row-cols-md-1 g-2">
                                        <div class="col" th:each="servico : ${servicos}">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" name="servicos" th:value="${servico.id}" th:id="'servico' + ${servico.id}">
                                                <label class="form-check-label" th:for="'servico' + ${servico.id}" th:text="${servico.nome}"></label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <h5 class="section-title">Bairros Atendidos:</h5>
                                    <div class="card bg-light">
                                        <div class="card-body" style="max-height: 200px; overflow-y: auto;">
                                            <div class="form-check" th:each="bairro : ${bairros}">
                                                <input class="form-check-input" type="checkbox" name="bairros" th:value="${bairro.id}" th:id="'bairro' + ${bairro.id}">
                                                <label class="form-check-label" th:for="'bairro' + ${bairro.id}" th:text="${bairro.nome}"></label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-5">
                            <a th:href="@{/}" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i> Voltar para Login</a>
                            <button type="submit" class="btn btn-primary btn-lg">Solicitar Cadastro</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePrestadorFields() {
        const prestadorFields = document.getElementById('prestadorFields');
        const isPrestador = document.getElementById('tipoPrestador').checked;
        const requiredInputs = prestadorFields.querySelectorAll('input[type="text"], input[type="number"], select');

        if (isPrestador) {
            prestadorFields.style.display = 'block';
            requiredInputs.forEach(input => input.required = true);
        } else {
            prestadorFields.style.display = 'none';
            requiredInputs.forEach(input => input.required = false);
        }
    }
</script>

</body>
</html>
