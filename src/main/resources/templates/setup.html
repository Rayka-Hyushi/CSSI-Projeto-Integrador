<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Inicial - Projeto Integrador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .setup-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .setup-header h1 {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .setup-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px 15px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-setup {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-setup:hover {
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }

        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .password-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #ccc;
        }

        .icon-setup {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-header">
            <div class="icon-setup">⚙️</div>
            <h1>Configuração Inicial</h1>
            <p>Crie o usuário administrador do sistema</p>
        </div>

        <!-- Alert de Erro -->
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Alert de Sucesso -->
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form method="post" action="/setup/criar-admin" onsubmit="return validarForm()">
            <div class="form-group">
                <label for="nomeCompleto">Nome Completo *</label>
                <input type="text" class="form-control" id="nomeCompleto" name="nomeCompleto" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="cpf">CPF *</label>
                <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp *</label>
                <input type="tel" class="form-control" id="whatsapp" name="whatsapp" placeholder="(00) 00000-0000" required>
            </div>

            <div class="divider">Credenciais de Acesso</div>

            <div class="form-group">
                <label for="senha">Senha *</label>
                <input type="password" class="form-control" id="senha" name="senha" required>
                <small class="password-info">Mínimo 6 caracteres</small>
            </div>

            <div class="form-group">
                <label for="confirmaSenha">Confirmar Senha *</label>
                <input type="password" class="form-control" id="confirmaSenha" name="confirmaSenha" required>
            </div>

            <button type="submit" class="btn-setup">Criar Administrador</button>
        </form>

        <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #999;">
            <p>Este é o primeiro acesso ao sistema. Depois de criar o administrador, você poderá fazer login normalmente.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function validarForm() {
            const senha = document.getElementById('senha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;

            if (senha !== confirmaSenha) {
                alert('As senhas não coincidem!');
                return false;
            }

            if (senha.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres!');
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
