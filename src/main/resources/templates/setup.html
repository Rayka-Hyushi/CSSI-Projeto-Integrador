<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Inicial - Projeto Integrador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .setup-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .setup-header h1 {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .setup-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px 15px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-setup {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-setup:hover {
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }

        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .password-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #ccc;
        }

        .icon-setup {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-header">
            <div class="icon-setup">⚙️</div>
            <h1>Configuração Inicial</h1>
            <p>Crie o usuário administrador do sistema</p>
        </div>

        <!-- Alert de Erro -->
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Alert de Sucesso -->
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form method="post" action="/setup/criar-admin" onsubmit="return validarForm(event)">
            <div class="form-group">
                <label for="nomeCompleto">Nome Completo *</label>
                <input type="text" class="form-control" id="nomeCompleto" name="nomeCompleto" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="cpf">CPF *</label>
                <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp *</label>
                <input type="tel" class="form-control" id="whatsapp" name="whatsapp" placeholder="(00) 00000-0000" required>
            </div>

            <div class="divider">Credenciais de Acesso</div>

            <div class="form-group">
                <label for="senha">Senha *</label>
                <input type="password" class="form-control" id="senha" name="senha" required>
                <small class="password-info">Mínimo 6 caracteres</small>
            </div>

            <div class="form-group">
                <label for="confirmaSenha">Confirmar Senha *</label>
                <input type="password" class="form-control" id="confirmaSenha" name="confirmaSenha" required>
            </div>

            <button type="submit" class="btn-setup">Criar Administrador</button>
        </form>

        <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #999;">
            <p>Este é o primeiro acesso ao sistema. Depois de criar o administrador, você poderá fazer login normalmente.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/imask@7.0.0/lib/imask.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Formatação nativa de CPF
        function formatarCPFNativo(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 8) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6, 9) + '-' + value.slice(9);
            } else if (value.length > 5) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6);
            } else if (value.length > 2) {
                value = value.slice(0, 3) + '.' + value.slice(3);
            }
            input.value = value;
        }

        // Formatação nativa de WhatsApp
        function formatarWhatsAppNativo(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 7) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7);
            } else if (value.length > 2) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2);
            } else if (value.length > 0) {
                value = '(' + value;
            }
            input.value = value;
        }

        // Usar formatação nativa
        function usarFormatacaoNativa() {
            const cpfInput = document.getElementById('cpf');
            if (cpfInput) {
                cpfInput.addEventListener('input', function() {
                    formatarCPFNativo(this);
                });
            }

            const whatsappInput = document.getElementById('whatsapp');
            if (whatsappInput) {
                whatsappInput.addEventListener('input', function() {
                    formatarWhatsAppNativo(this);
                });
            }
            console.log('✅ Formatação nativa ativada');
        }

        // Inicializar máscaras de entrada com tratamento de erro
        function inicializarMascaras() {
            try {
                if (!window.IMask) {
                    console.warn('IMask não carregou, usando formatação nativa');
                    usarFormatacaoNativa();
                    return;
                }

                // CPF: 000.000.000-00
                const cpfInput = document.getElementById('cpf');
                if (cpfInput) {
                    IMask(cpfInput, {
                        mask: '000.000.000-00'
                    });
                    console.log('✅ Máscara CPF (IMask) inicializada');
                }

                // WhatsApp: (00) 00000-0000
                const whatsappInput = document.getElementById('whatsapp');
                if (whatsappInput) {
                    IMask(whatsappInput, {
                        mask: '(00) 00000-0000'
                    });
                    console.log('✅ Máscara WhatsApp (IMask) inicializada');
                }
            } catch (error) {
                console.error('Erro ao usar IMask:', error);
                usarFormatacaoNativa();
            }
        }

        // Tenta inicializar quando o documento está pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inicializarMascaras);
        } else {
            inicializarMascaras();
        }

        function validarCPF(cpf) {
            cpf = cpf.replace(/[^\d]/g, '');

            if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) {
                return false;
            }

            let soma = 0;
            let resto;

            for (let i = 1; i <= 9; i++) {
                soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            }

            resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;

            soma = 0;
            for (let i = 1; i <= 10; i++) {
                soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            }

            resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;

            return true;
        }

        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function validarForm(event) {
            const nomeCompleto = document.getElementById('nomeCompleto').value.trim();
            const email = document.getElementById('email').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const senha = document.getElementById('senha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;

            // Remover alertas anteriores
            removerMensagensErro();

            // Validar nome completo
            if (!nomeCompleto || nomeCompleto.length < 5) {
                mostrarErro('Nome completo deve ter pelo menos 5 caracteres!');
                return false;
            }

            // Validar email
            if (!email || !validarEmail(email)) {
                mostrarErro('Email inválido! Use um formato válido (ex: usuario@exemplo.com)');
                return false;
            }

            // Validar CPF
            if (!cpf || !validarCPF(cpf)) {
                mostrarErro('CPF inválido! Verifique o número informado.');
                return false;
            }

            // Validar WhatsApp
            if (!whatsapp || whatsapp.replace(/[^\d]/g, '').length !== 11) {
                mostrarErro('WhatsApp inválido! Use o formato (XX) XXXXX-XXXX');
                return false;
            }

            // Validar senha
            if (!senha || senha.length < 6) {
                mostrarErro('A senha deve ter pelo menos 6 caracteres!');
                return false;
            }

            // Validar confirmação de senha
            if (senha !== confirmaSenha) {
                mostrarErro('As senhas não coincidem!');
                return false;
            }

            return true;
        }

        function mostrarErro(mensagem) {
            // Cria novo alert
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
            alertDiv.setAttribute('role', 'alert');
            alertDiv.innerHTML = `
                <i class="bi bi-exclamation-circle"></i> <strong>Erro!</strong> ${mensagem}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;

            const form = document.querySelector('form');
            form.parentNode.insertBefore(alertDiv, form);

            // Scroll para o erro
            alertDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Remove alert após 6 segundos
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.remove();
                }
            }, 6000);
        }

        function removerMensagensErro() {
            const alertas = document.querySelectorAll('.alert-danger');
            alertas.forEach(alert => alert.remove());
        }
    </script>
</body>
</html>
