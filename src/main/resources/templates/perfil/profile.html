<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/navbar :: head('Meu Perfil')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-header bg-white text-center py-4">
                    <h3 class="card-title fw-bold mb-0">Meu Perfil</h3>
                    <p class="text-muted mb-0">Gerencie suas informações</p>
                </div>

                <div class="card-body p-4">
                    <!-- Foto Preview -->
                    <div class="text-center mb-4">
                        <img th:src="${usuario != null && usuario.profilePhotoUrl != null && !usuario.profilePhotoUrl.isEmpty() ? usuario.profilePhotoUrl : (usuario != null && usuario.nomeCompleto != null ? 'https://ui-avatars.com/api/?name=' + usuario.nomeCompleto + '&background=random' : 'https://ui-avatars.com/api/?name=User&background=random')}"
                             th:data-fallback="'https://ui-avatars.com/api/?name=' + (${usuario != null && usuario.nomeCompleto != null ? usuario.nomeCompleto : 'User'}) + '&background=random'"
                             onerror="this.onerror=null; this.src=this.getAttribute('data-fallback');"
                             class="rounded-circle shadow-sm"
                             width="120"
                             height="120"
                             style="object-fit: cover;"
                             alt="Foto de perfil grande">
                    </div>

                    <!-- Mensagens de Alerta -->
                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
                    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

                    <!-- Form de Foto (Todos podem alterar a própria foto) -->
                    <form th:action="@{/perfil/foto}" method="post" enctype="multipart/form-data" class="mb-5">
                        <div class="mb-3">
                            <label for="foto" class="form-label fw-bold">Alterar foto de perfil</label>
                            <div class="input-group">
                                <input class="form-control" type="file" id="foto" name="foto" accept="image/*" required>
                                <button class="btn btn-primary" type="submit">Enviar</button>
                            </div>
                        </div>
                    </form>

                    <hr>

                    <!-- Seções que dependem do Role do Usuário -->
                    <div sec:authorize="hasRole('ADMIN')">
                        <h5 class="fw-bold mb-3">Informações Pessoais (Administrador)</h5>
                        <form th:action="@{/perfil/dados}" method="post" onsubmit="return validarFormularioPerfil(event)">
                            <div class="mb-3">
                                <label for="nomeCompleto" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nomeCompleto" name="nomeCompleto"
                                       th:value="${usuario.nomeCompleto}" required>
                            </div>
                            <div class="mb-3">
                                <label for="cpf" class="form-label">CPF</label>
                                <input type="text" class="form-control" id="cpf" name="cpf" th:value="${usuario.cpf}">
                            </div>
                            <div class="mb-3">
                                <label for="whatsapp" class="form-label">WhatsApp</label>
                                <input type="text" class="form-control" id="whatsapp" name="whatsapp"
                                       th:value="${usuario.whatsapp}" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       th:value="${usuario.email}" required>
                            </div>
                            <!-- Alterar Senha Admin opcional -->
                            <div class="mb-3">
                                <label for="senhaNovaAdmin" class="form-label">Nova Senha (deixe em branco para não
                                    alterar)</label>
                                <input type="password" class="form-control" id="senhaNovaAdmin" name="senha">
                            </div>
                            <div class="d-flex justify-content-between mt-4">
                                <button type="reset" class="btn btn-secondary">Cancelar</button>
                                <button type="submit" class="btn btn-success">Atualizar Dados</button>
                            </div>
                        </form>
                    </div>

                    <div sec:authorize="!hasRole('ADMIN')">
                        <h5 class="fw-bold mb-3">Minhas Informações</h5>
                        <p class="text-muted small">
                            Seus dados não podem ser alterados diretamente por você por motivos de segurança.
                        </p>

                        <!-- Dados em Read-Only -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome Completo</label>
                            <p class="form-control bg-light" th:text="${usuario.nomeCompleto}"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">CPF</label>
                            <p class="form-control bg-light" th:text="${usuario.cpf}"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">WhatsApp</label>
                            <p class="form-control bg-light" th:text="${usuario.whatsapp}"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">E-mail</label>
                            <p class="form-control bg-light" th:text="${usuario.email}"></p>
                        </div>

                        <!-- Formulário Alterar Senha Livre -->
                        <hr class="my-4">
                        <h5 class="fw-bold mb-3">Alterar minha senha</h5>
                        <form th:action="@{/perfil/dados}" method="post">
                            <div class="mb-3">
                                <label for="senhaNova" class="form-label">Nova Senha</label>
                                <input type="password" class="form-control" id="senhaNova" name="senha" required
                                       minlength="6">
                            </div>
                            <!-- Envia os dados atuais como hidden para reutilizar o endpoint ou o controller cuida -->
                            <input type="hidden" name="nomeCompleto" th:value="${usuario.nomeCompleto}">
                            <input type="hidden" name="email" th:value="${usuario.email}">
                            <input type="hidden" name="whatsapp" th:value="${usuario.whatsapp}">
                            <input type="hidden" name="cpf" th:value="${usuario.cpf}">
                            <button type="submit" class="btn btn-primary w-100">Atualizar Senha</button>
                        </form>

                        <div class="mt-4">
                            <button class="btn btn-warning w-100" data-bs-toggle="modal"
                                    data-bs-target="#solicitacaoModal">
                                <i class="bi bi-headset me-2"></i> Solicitar Alteração de Dados
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Solicitação -->
<div sec:authorize="!hasRole('ADMIN')" class="modal fade" id="solicitacaoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/perfil/solicitacao}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Abrir Solicitação (Suporte/Atualização)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="assunto" class="form-label">Assunto</label>
                        <select class="form-select" id="assunto" name="assunto">
                            <option value="ALTERACAO_DADOS">Alteração de Cadastro</option>
                            <option value="SUPORTE">Suporte Geral</option>
                            <option value="OUTRO">Outro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="mensagem" class="form-label">O que você precisa?</label>
                        <textarea class="form-control" id="mensagem" name="mensagem" rows="4"
                                  placeholder="Descreva o que deseja alterar, ou seu problema de suporte..."
                                  required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar Solicitação</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/navbar :: footer}"></footer>
<div th:replace="~{fragments/navbar :: scripts}"></div>

<script src="https://cdn.jsdelivr.net/npm/imask@7.0.0/lib/imask.min.js"></script>
<script>
    // Formatação nativa de CPF
    function formatarCPFNativo(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        if (value.length > 8) {
            value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6, 9) + '-' + value.slice(9);
        } else if (value.length > 5) {
            value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6);
        } else if (value.length > 2) {
            value = value.slice(0, 3) + '.' + value.slice(3);
        }
        input.value = value;
    }

    // Formatação nativa de WhatsApp
    function formatarWhatsAppNativo(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        if (value.length > 7) {
            value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7);
        } else if (value.length > 2) {
            value = '(' + value.slice(0, 2) + ') ' + value.slice(2);
        } else if (value.length > 0) {
            value = '(' + value;
        }
        input.value = value;
    }

    // Usar formatação nativa
    function usarFormatacaoNativa() {
        const cpfInputs = document.querySelectorAll('#cpf');
        cpfInputs.forEach(input => {
            if (input) {
                input.addEventListener('input', function() {
                    formatarCPFNativo(this);
                });
            }
        });

        const whatsappInputs = document.querySelectorAll('#whatsapp');
        whatsappInputs.forEach(input => {
            if (input) {
                input.addEventListener('input', function() {
                    formatarWhatsAppNativo(this);
                });
            }
        });
        console.log('✅ Formatação nativa ativada');
    }

    // Inicializar máscaras de entrada com tratamento de erro
    function inicializarMascaras() {
        try {
            if (!window.IMask) {
                console.warn('IMask não carregou, usando formatação nativa');
                usarFormatacaoNativa();
                return;
            }

            // CPF: 000.000.000-00
            const cpfInputs = document.querySelectorAll('#cpf');
            cpfInputs.forEach(input => {
                if (input) {
                    IMask(input, {
                        mask: '000.000.000-00'
                    });
                }
            });
            console.log('✅ Máscara CPF (IMask) inicializada');

            // WhatsApp: (00) 00000-0000
            const whatsappInputs = document.querySelectorAll('#whatsapp');
            whatsappInputs.forEach(input => {
                if (input) {
                    IMask(input, {
                        mask: '(00) 00000-0000'
                    });
                }
            });
            console.log('✅ Máscara WhatsApp (IMask) inicializada');
        } catch (error) {
            console.error('Erro ao usar IMask:', error);
            usarFormatacaoNativa();
        }
    }

    // Tenta inicializar quando o documento está pronto
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', inicializarMascaras);
    } else {
        inicializarMascaras();
    }

    function validarCPF(cpf) {
        cpf = cpf.replace(/[^\d]/g, '');

        if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) {
            return false;
        }

        let soma = 0;
        let resto;

        for (let i = 1; i <= 9; i++) {
            soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
        }

        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;

        soma = 0;
        for (let i = 1; i <= 10; i++) {
            soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
        }

        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(10, 11))) return false;

        return true;
    }

    function validarEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
    }

    function validarFormularioPerfil(event) {
        event.preventDefault();

        const nomeCompleto = document.getElementById('nomeCompleto').value.trim();
        const email = document.getElementById('email').value.trim();
        const cpf = document.getElementById('cpf').value.trim();
        const whatsapp = document.getElementById('whatsapp').value.trim();

        // Limpas mensagens de erro anteriores
        removerMensagensErro();

        // Validar nome completo
        if (nomeCompleto && nomeCompleto.length < 5) {
            mostrarErro('Nome completo deve ter pelo menos 5 caracteres!');
            return false;
        }

        // Validar email
        if (email && !validarEmail(email)) {
            mostrarErro('Email inválido! Use um formato válido (ex: usuario@exemplo.com)');
            return false;
        }

        // Validar CPF (se preenchido)
        if (cpf && !validarCPF(cpf)) {
            mostrarErro('CPF inválido! Verifique o número informado.');
            return false;
        }

        // Validar WhatsApp (se preenchido)
        if (whatsapp && whatsapp.replace(/[^\d]/g, '').length !== 11) {
            mostrarErro('WhatsApp inválido! Use o formato (XX) XXXXX-XXXX');
            return false;
        }

        // Se passou em todas as validações, submit
        event.target.submit();
        return false;
    }

    function mostrarErro(mensagem) {
        const form = document.querySelector('form');
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-danger alert-dismissible fade show mt-3';
        alertDiv.setAttribute('role', 'alert');
        alertDiv.innerHTML = `
            <i class="bi bi-exclamation-circle"></i> ${mensagem}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        form.parentNode.insertBefore(alertDiv, form);

        // Scroll para mostrar o erro
        alertDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function removerMensagensErro() {
        const alertas = document.querySelectorAll('.alert');
        alertas.forEach(alert => {
            // Remove apenas alertas de validação, não os da aplicação
            if (!alert.classList.contains('alert-dismissible') || alert.textContent.includes('inválid') ||
                alert.textContent.includes('coincidem') || alert.textContent.includes('caracteres')) {
                alert.remove();
            }
        });
    }
</script>
</body>
</html>
