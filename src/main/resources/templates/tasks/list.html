<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tarefas')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container">

        <!-- Page header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="bi bi-list-task me-2 text-primary"></i>Tarefas</h2>
            <a th:href="@{/tasks/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Nova Tarefa
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search & filter bar -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form method="get" th:action="@{/tasks}" class="row g-2 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small text-muted">Buscar por título</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" name="search" class="form-control"
                                   placeholder="Digite para buscar…" th:value="${search}"/>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small text-muted">Filtrar por status</label>
                        <select name="status" class="form-select">
                            <option value="">Todos os status</option>
                            <option th:each="s : ${statuses}"
                                    th:value="${s}"
                                    th:text="${s.label}"
                                    th:selected="${s == selectedStatus}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-outline-primary flex-fill">
                                <i class="bi bi-funnel me-1"></i>Filtrar
                            </button>
                            <a th:href="@{/tasks}" class="btn btn-outline-secondary flex-fill">
                                <i class="bi bi-x-lg me-1"></i>Limpar
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tasks table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(tasks)}" class="text-center text-muted py-5">
                    <i class="bi bi-inbox fs-1"></i>
                    <p class="mt-2">Nenhuma tarefa encontrada.</p>
                    <a th:href="@{/tasks/new}" class="btn btn-primary btn-sm">Criar primeira tarefa</a>
                </div>
                <div th:unless="${#lists.isEmpty(tasks)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Título</th>
                                <th>Status</th>
                                <th>Criado em</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="task : ${tasks}">
                                <td class="text-muted small" th:text="${task.id}"></td>
                                <td>
                                    <a th:href="@{/tasks/{id}(id=${task.id})}"
                                       class="text-decoration-none fw-semibold"
                                       th:text="${task.title}"></a>
                                    <p class="text-muted small mb-0 text-truncate" style="max-width:350px"
                                       th:text="${task.description}"></p>
                                </td>
                                <td>
                                    <span th:class="${'badge ' + (task.status.name() == 'DONE' ? 'bg-success' : task.status.name() == 'IN_PROGRESS' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                          th:text="${task.status.label}"></span>
                                </td>
                                <td class="text-muted small"
                                    th:text="${#temporals.format(task.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="text-end">
                                    <a th:href="@{/tasks/{id}(id=${task.id})}"
                                       class="btn btn-sm btn-outline-secondary me-1" title="Ver">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}"
                                       class="btn btn-sm btn-outline-primary me-1" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
                                          class="d-inline"
                                          onsubmit="return confirm('Confirmar exclusão?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Excluir">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
