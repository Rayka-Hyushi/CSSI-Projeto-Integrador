<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<!-- Reutiliza o fragmento 'head' do seu arquivo modelos/compartilhados.html -->
<head th:replace="~{modelos/compartilhados :: head('Painel de Controle')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Reutiliza sua navbar padrão -->
<nav th:replace="~{modelos/compartilhados :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container">
        <!-- Cabeçalho da Página -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">
                <i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard
            </h2>
            <span class="text-muted" th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy')}"></span>
        </div>

        <!-- Cards de Resumo (Estilo Dashboard) -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center">
                        <div class="flex-shrink-0 bg-primary bg-opacity-10 p-3 rounded">
                            <i class="bi bi-box-seam fs-3 text-primary"></i>
                        </div>
                        <div class="ms-3">
                            <h6 class="card-subtitle mb-1 text-muted">Solicitações</h6>
                            <h4 class="card-title mb-0 fw-bold">12</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center">
                        <div class="flex-shrink-0 bg-warning bg-opacity-10 p-3 rounded">
                            <i class="bi bi-clock-history fs-3 text-warning"></i>
                        </div>
                        <div class="ms-3">
                            <h6 class="card-subtitle mb-1 text-muted">Em Andamento</h6>
                            <h4 class="card-title mb-0 fw-bold">5</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center">
                        <div class="flex-shrink-0 bg-success bg-opacity-10 p-3 rounded">
                            <i class="bi bi-check2-circle fs-3 text-success"></i>
                        </div>
                        <div class="ms-3">
                            <h6 class="card-subtitle mb-1 text-muted">Finalizados</h6>
                            <h4 class="card-title mb-0 fw-bold">28</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabela de Atividades Recentes (Baseada no seu layout de tarefas) -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Atividade Recente</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Descrição do Frete</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th class="text-end">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!-- Exemplo de linha estática para teste -->
                        <tr>
                            <td class="text-muted small">#101</td>
                            <td><strong>Entrega Centro - Camobi</strong></td>
                            <td class="text-muted small">06/05/2026</td>
                            <td><span class="badge bg-warning text-dark">Pendente</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i> Detalhes
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Reutiliza seu footer e scripts -->
<footer th:replace="~{modelos/compartilhados :: footer}"></footer>
<div th:replace="~{modelos/compartilhados :: scripts}"></div>
</body>
</html>
