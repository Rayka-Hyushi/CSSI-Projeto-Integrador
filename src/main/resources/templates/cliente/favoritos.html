<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('Meus Favoritos')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1"><i class="bi bi-heart-fill text-danger me-2"></i>Meus Favoritos</h1>
                <p class="text-muted mb-0">Gerencie seus prestadores de serviço preferidos.</p>
            </div>
            <a th:href="@{/cliente/inicio}" class="btn btn-outline-primary">
                <i class="bi bi-search me-1"></i> Buscar Prestadores
            </a>
        </div>

        <div th:if="${favoritos != null and !#lists.isEmpty(favoritos)}" class="row g-4">
            <div class="col-md-6 col-xl-4" th:each="prestador : ${favoritos}">
                <div class="card h-100 border-0 shadow-sm cliente-result-card">
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="position-relative">
                                <img class="rounded-circle cliente-avatar" width="64" height="64"
                                     th:src="${prestador.profilePhotoUrl != null and !#strings.isEmpty(prestador.profilePhotoUrl) ? prestador.profilePhotoUrl : 'https://ui-avatars.com/api/?name=' + prestador.nomeCompleto + '&background=random'}"
                                     th:data-fallback="'https://ui-avatars.com/api/?name=' + ${prestador.nomeCompleto} + '&background=random'"
                                     onerror="this.onerror=null; this.src=this.getAttribute('data-fallback');"
                                     alt="Foto do prestador">
                                <span style="width: 15px; height: 15px; border: 2px solid white;"
                                      th:class="${'position-absolute bottom-0 end-0 rounded-circle ' + (prestador.statusOnline ? 'bg-success' : 'bg-secondary')}"
                                      title="Status online"></span>
                            </div>
                            <div>
                                <h3 class="h6 fw-bold mb-1" th:text="${prestador.nomeCompleto}">Nome</h3>
                                <small class="text-muted"
                                       th:text="${prestador.statusOnline ? 'Online' : 'Offline'}"></small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-2">Veículo(s)</small>
                            <div class="d-flex flex-column gap-1">
                                <div th:if="${prestador.veiculos != null and !#lists.isEmpty(prestador.veiculos)}"
                                     th:each="veiculo : ${prestador.veiculos}">
                                    <span class="badge rounded-pill text-bg-light border text-dark"
                                          th:text="${veiculo.tipo}">Tipo</span>
                                    <small class="text-muted ms-1" th:text="${veiculo.capacidadeCarga + ' kg'}">0
                                        kg</small>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-2">Bairros atendidos</small>
                            <div class="d-flex flex-wrap gap-2">
                                <span class="badge rounded-pill text-bg-light border text-dark"
                                      th:each="bairro : ${prestador.bairros}"
                                      th:text="${bairro.nomeBairro}"></span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-2">Serviços adicionais</small>
                            <div class="d-flex flex-wrap gap-2">
                                <span class="badge rounded-pill text-bg-primary"
                                      th:each="servico : ${prestador.servicos}"
                                      th:text="${servico.nomeServico}"></span>
                            </div>
                        </div>

                        <div class="mt-auto d-grid gap-2">
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-success flex-grow-1"
                                        th:attr="data-whatsapp=${prestador.whatsapp}" onclick="abrirWhatsApp(this)">
                                    <i class="bi bi-whatsapp me-1"></i> WhatsApp
                                </button>
                                <button type="button" class="btn btn-danger"
                                        th:attr="data-prestador-id=${prestador.id}"
                                        onclick="removerFavorito(this)"
                                        title="Remover dos favoritos">
                                    <i class="bi bi-heart-fill"></i>
                                </button>
                            </div>
                            <button type="button" class="btn btn-outline-warning"
                                    th:attr="data-prestador-id=${prestador.id}"
                                    onclick="recomendarPrestador(this)">
                                <i class="bi bi-hand-thumbs-up me-1"></i>
                                <span class="count" th:text="${prestador.recomendacoes}">0</span>
                                <span class="text">Recomendar</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:unless="${favoritos != null and !#lists.isEmpty(favoritos)}" class="text-center py-5">
            <i class="bi bi-heart fs-1 text-muted"></i>
            <h3 class="h5 fw-bold mt-3">Sua lista de favoritos está vazia</h3>
            <p class="text-muted mb-4">Você ainda não favoritou nenhum prestador de serviço.</p>
            <a th:href="@{/cliente/inicio}" class="btn btn-primary btn-lg">
                Começar a buscar
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/navbar :: footer}"></footer>
<div th:replace="~{fragments/navbar :: scripts}"></div>

<script>
    function abrirWhatsApp(botao) {
        const numero = (botao.getAttribute('data-whatsapp') || '').replace(/\D/g, '');
        if (!numero) return;
        window.open('https://wa.me/' + numero, '_blank', 'noopener');
    }

    function removerFavorito(botao) {
        const prestadorId = botao.getAttribute('data-prestador-id');
        const card = botao.closest('.col-md-6');

        botao.disabled = true;

        fetch(`/cliente/favoritar/${prestadorId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso && !data.isFavorito) {
                    // Remove o card da tela com uma animação simples
                    card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        card.remove();
                        // Se não houver mais cards, recarrega a página para mostrar a mensagem de lista vazia
                        if (document.querySelectorAll('.cliente-result-card').length === 0) {
                            location.reload();
                        }
                    }, 300);
                    showNotification(data.mensagem, 'success');
                } else {
                    botao.disabled = false;
                    showNotification(data.mensagem, 'warning');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                botao.disabled = false;
                showNotification('Erro ao remover favorito', 'danger');
            });
    }

    function recomendarPrestador(botao) {
        const prestadorId = botao.getAttribute('data-prestador-id');
        const countElement = botao.querySelector('.count');
        const textElement = botao.querySelector('.text');

        botao.disabled = true;
        const textoOriginal = textElement.textContent;
        textElement.textContent = 'Enviando...';

        fetch(`/cliente/recomendar/${prestadorId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    countElement.textContent = data.novasRecomendacoes;
                    textElement.textContent = 'Recomendado!';
                    botao.classList.remove('btn-outline-warning');
                    botao.classList.add('btn-warning');
                    showNotification(data.mensagem, 'success');
                } else {
                    textElement.textContent = textoOriginal;
                    botao.disabled = false;
                    showNotification(data.mensagem, 'warning');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                textElement.textContent = textoOriginal;
                botao.disabled = false;
                showNotification('Erro ao tentar recomendar', 'danger');
            });
    }

    function showNotification(mensagem, tipo) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${tipo} alert-dismissible fade show`;
        alertDiv.setAttribute('role', 'alert');
        alertDiv.style.position = 'fixed';
        alertDiv.style.top = '20px';
        alertDiv.style.right = '20px';
        alertDiv.style.minWidth = '300px';
        alertDiv.style.zIndex = '9999';
        alertDiv.innerHTML = mensagem +
            '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>';
        document.body.appendChild(alertDiv);
        setTimeout(() => {
            alertDiv.remove();
        }, 4000);
    }
</script>
</body>
</html>
