<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<!-- ===== HEAD fragment ===== -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' – Projeto Integrador'">Projeto Integrador</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Custom styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<!-- ===== NAVBAR fragment ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-kanban me-1"></i> Projeto Integrador
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house me-1"></i>Início
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tasks}">
                        <i class="bi bi-list-task me-1"></i>Tarefas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tasks/new}">
                        <i class="bi bi-plus-circle me-1"></i>Nova Tarefa
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== FOOTER fragment ===== -->
<footer th:fragment="footer" class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        &copy; 2024 Projeto Integrador – CSSI &middot; Desenvolvido com
        <i class="bi bi-heart-fill text-danger"></i> e Spring Boot
    </div>
</footer>

<!-- ===== SCRIPTS fragment ===== -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmk4J0FfBFvIVAkLuG0BKNM1R9e"
            crossorigin="anonymous"></script>
</div>

</html>
